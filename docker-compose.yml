name: geef-atelier

services:
  web:
    build:
      context: .
      dockerfile: src/Geef.Atelier.Web/Dockerfile
    image: geef-atelier-web:latest
    pull_policy: never
    container_name: geef-atelier-web
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - AtelierUser__Username=${ATELIER_USER}
      - AtelierUser__PasswordHash=${ATELIER_PASSWORD_HASH}
      - AtelierMcp__Token=${ATELIER_MCP_TOKEN}
      - Llm__Providers__openrouter__ApiKey=${LLM_OPENROUTER_API_KEY}
      - Tavily__ApiKey=${TAVILY_API_KEY}
      - CliProxy__InternalApiToken=${ATELIER_INTERNAL_API_TOKEN:-}
      # Per-provider API keys read by ModelCatalog/LLM clients via each provider's api_key_env.
      - LLM_OPENROUTER_API_KEY=${LLM_OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      cli-proxy:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - geef-atelier-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.geef-atelier.rule=Host(`${ATELIER_DOMAIN}`)"
      - "traefik.http.routers.geef-atelier.entrypoints=websecure"
      - "traefik.http.routers.geef-atelier.tls=true"
      - "traefik.http.routers.geef-atelier.tls.certresolver=le"
      - "traefik.http.routers.geef-atelier.middlewares=chain@file"
      - "traefik.http.services.geef-atelier.loadbalancer.server.port=8080"
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - geef-atelier-exports:/app/exports
      - geef-atelier-dpkeys:/app/dataprotection-keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cli-proxy:
    build:
      context: ./cli-proxy
      dockerfile: Dockerfile
    image: geef-atelier-cli-proxy:latest
    pull_policy: never
    container_name: geef-atelier-cli-proxy
    restart: unless-stopped
    environment:
      - CLAUDE_MAX_CONCURRENT=2
      - CODEX_MAX_CONCURRENT=2
      - WORKSPACE_ROOT=/work
      - CLAUDE_HOME=/auth/claude
      - CODEX_HOME=/auth/codex
      - GEMINI_HOME=/auth/gemini
      - OPENCODE_HOME=/auth/opencode
      - OPENROUTER_API_KEY=${LLM_OPENROUTER_API_KEY}
      - ATELIER_BACKEND_URL=http://web:8080
      - ATELIER_INTERNAL_API_TOKEN=${ATELIER_INTERNAL_API_TOKEN:-}
    volumes:
      - geef-atelier-cli-auth:/auth
    networks:
      - geef-atelier-network
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: geef-atelier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - geef_atelier_postgres_data:/var/lib/postgresql/data
    networks:
      - geef-atelier-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: geef-atelier-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: "0 3 * * *"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - geef-atelier-backups:/backups
    networks:
      - geef-atelier-network
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

networks:
  geef-atelier-network:
    driver: bridge
  proxy:
    external: true

volumes:
  geef_atelier_postgres_data:
  geef-atelier-backups:
  geef-atelier-cli-auth:
  geef-atelier-exports:
  geef-atelier-dpkeys:
